services:
  - type: web
    name: kyc-backend
    env: python
    buildCommand: cd kyc_backend && pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: cd kyc_backend && python manage.py migrate && python manage.py seed_data && gunicorn kyc_project.wsgi:application --log-file - --timeout 60
    plan: free
    numInstances: 1
    envVars:
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "kyc-pipeline.onrender.com,localhost"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://kyc-pipeline.onrender.com,http://localhost:3000,http://localhost:5173"

  - type: web
    name: kyc-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: cd kyc_frontend && npm install && npm run build
    startCommand: cd kyc_frontend && npm run preview
    numInstances: 1
    envVars:
      - key: VITE_API_URL
        value: "https://kyc-pipeline.onrender.com/api/v1"
